<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tongcho7.com</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: url("assets/poulet roti juteux.jpg") repeat;
      background-size: 280px auto;
      position: relative;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
      pointer-events: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", cursive;
      font-size: clamp(2rem, 8vw, 5.5rem);
      font-weight: 900;
      text-align: center;
      line-height: 1.15;
      letter-spacing: 0.05em;
      white-space: nowrap;
      user-select: none;
      animation: drift 4s ease-in-out infinite alternate;
    }

    .title span {
      display: inline-block;
      text-shadow:
        3px 3px 0 #000,
        -1px -1px 0 #fff,
        0 0 12px rgba(255, 255, 255, 0.6);
      animation: wobble 2.5s ease-in-out infinite;
    }

    /* Couleurs clip-art par lettre */
    .title span:nth-child(1)  { color: #ff006e; animation-delay: 0s;    animation-duration: 1.8s; }
    .title span:nth-child(2)  { color: #fb5607; animation-delay: 0.1s;  animation-duration: 2.1s; }
    .title span:nth-child(3)  { color: #ffbe0b; animation-delay: 0.2s;  animation-duration: 1.6s; }
    .title span:nth-child(4)  { color: #8338ec; animation-delay: 0.05s; animation-duration: 2.4s; }
    .title span:nth-child(5)  { color: #3a86ff; animation-delay: 0.15s; animation-duration: 1.9s; }
    .title span:nth-child(6)  { color: #06d6a0; animation-delay: 0.25s; animation-duration: 2.2s; }
    .title span:nth-child(7)  { color: #ef476f; animation-delay: 0.08s; animation-duration: 1.7s; }
    .title span:nth-child(8)  { color: #118ab2; animation-delay: 0.18s; animation-duration: 2.0s; }
    .title span:nth-child(9)  { color: #ffd166; animation-delay: 0.28s; animation-duration: 2.3s; }
    .title span:nth-child(10) { color: #06d6a0; animation-delay: 0.12s; animation-duration: 1.5s; }
    .title span:nth-child(11) { color: #9b5de5; animation-delay: 0.22s; animation-duration: 2.5s; }
    .title span:nth-child(12) { color: #f15bb5; animation-delay: 0.03s; animation-duration: 1.8s; }
    .title span:nth-child(13) { color: #00bbf9; animation-delay: 0.13s; animation-duration: 2.1s; }
    .title span:nth-child(14) { color: #fee440; animation-delay: 0.23s; animation-duration: 1.6s; }
    .title span:nth-child(15) { color: #ff006e; animation-delay: 0.33s; animation-duration: 2.4s; }
    .title span:nth-child(16) { color: transparent; width: 0.4em; }
    .title span:nth-child(17) { color: #ff5400; animation-delay: 0.07s; animation-duration: 2.0s; }
    .title span:nth-child(18) { color: #ffbd00; animation-delay: 0.17s; animation-duration: 1.9s; }
    .title span:nth-child(19) { color: #8338ec; animation-delay: 0.27s; animation-duration: 2.2s; }
    .title span:nth-child(20) { color: #3a86ff; animation-delay: 0.09s; animation-duration: 1.7s; }
    .title span:nth-child(21) { color: #06d6a0; animation-delay: 0.19s; animation-duration: 2.3s; }
    .title span:nth-child(22) { color: transparent; width: 0.4em; }
    .title span:nth-child(23) { color: #ef476f; animation-delay: 0.11s; animation-duration: 1.8s; }
    .title span:nth-child(24) { color: #118ab2; animation-delay: 0.21s; animation-duration: 2.1s; }
    .title span:nth-child(25) { color: #ffd166; animation-delay: 0.31s; animation-duration: 1.6s; }
    .title span:nth-child(26) { color: #9b5de5; animation-delay: 0.04s; animation-duration: 2.5s; }
    .title span:nth-child(27) { color: #f15bb5; animation-delay: 0.14s; animation-duration: 1.9s; }
    .title span:nth-child(28) { color: #00bbf9; animation-delay: 0.24s; animation-duration: 2.0s; }
    .title span:nth-child(29) { color: #ff006e; animation-delay: 0.34s; animation-duration: 2.2s; }
    .title span:nth-child(30) { color: #fb5607; animation-delay: 0.06s; animation-duration: 1.7s; }

    @keyframes wobble {
      0%   { transform: translate(0, 0) rotate(0deg) scale(1); }
      20%  { transform: translate(8px, -12px) rotate(12deg) scale(1.15); }
      40%  { transform: translate(-10px, 6px) rotate(-8deg) scale(0.9); }
      60%  { transform: translate(6px, 10px) rotate(6deg) scale(1.1); }
      80%  { transform: translate(-8px, -8px) rotate(-14deg) scale(1.05); }
      100% { transform: translate(4px, 4px) rotate(10deg) scale(1); }
    }

    @keyframes drift {
      0%   { transform: translate(-30px, -20px) rotate(-5deg); }
      25%  { transform: translate(40px, 15px) rotate(8deg); }
      50%  { transform: translate(-15px, 35px) rotate(-12deg); }
      75%  { transform: translate(25px, -30px) rotate(6deg); }
      100% { transform: translate(-20px, 10px) rotate(-3deg); }
    }

    /* Petites poules clip-art flottantes */
    .floater {
      position: fixed;
      font-size: clamp(2rem, 5vw, 4rem);
      pointer-events: none;
      animation: float-around 6s ease-in-out infinite;
      filter: drop-shadow(2px 2px 0 #000);
    }

    .floater:nth-child(1) { top: 10%; left: 5%;  animation-delay: 0s;   animation-duration: 5s; }
    .floater:nth-child(2) { top: 70%; left: 80%; animation-delay: 1s;   animation-duration: 7s; }
    .floater:nth-child(3) { top: 20%; left: 75%; animation-delay: 2s;   animation-duration: 4.5s; }
    .floater:nth-child(4) { top: 80%; left: 10%; animation-delay: 0.5s; animation-duration: 6.5s; }

    @keyframes float-around {
      0%   { transform: translate(0, 0) rotate(0deg); }
      25%  { transform: translate(60px, -40px) rotate(45deg); }
      50%  { transform: translate(-30px, 50px) rotate(-30deg); }
      75%  { transform: translate(40px, 30px) rotate(20deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="floater">🍗</div>
  <div class="floater">🐔</div>
  <div class="floater">🔥</div>
  <div class="floater">🍗</div>

  <div class="stage">
    <h1 class="title" id="title"></h1>
  </div>

  <script>
    const text = "HRMRMMRMMMMM POULER ROTI";
    const title = document.getElementById("title");

    for (const char of text) {
      const span = document.createElement("span");
      span.textContent = char;
      title.appendChild(span);
    }
  </script>
</body>
</html>
