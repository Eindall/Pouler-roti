<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tongcho7.com</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --tile-size: clamp(140px, 28vw, 280px);
      --title-size: clamp(1.35rem, 6.5vw, 5.5rem);
      --shadow: clamp(1px, 0.4vw, 3px);
      --glow: clamp(6px, 1.5vw, 12px);
    }

    html, body {
      width: 100%;
      min-height: 100%;
      min-height: 100dvh;
      overflow: hidden;
    }

    body {
      background: url("assets/poulet roti juteux.jpg") repeat;
      background-size: var(--tile-size) auto;
      position: relative;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
      pointer-events: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(0.75rem, env(safe-area-inset-top))
        max(0.75rem, env(safe-area-inset-right))
        max(0.75rem, env(safe-area-inset-bottom))
        max(0.75rem, env(safe-area-inset-left));
    }

    .title {
      font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", cursive;
      font-size: var(--title-size);
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      letter-spacing: 0.04em;
      max-width: 100%;
      user-select: none;
      animation: drift 4s ease-in-out infinite alternate;
    }

    .line {
      display: block;
      white-space: nowrap;
    }

    .line + .line {
      margin-top: 0.15em;
    }

    .title span.letter {
      display: inline-block;
      text-shadow:
        var(--shadow) var(--shadow) 0 #000,
        calc(var(--shadow) * -0.33) calc(var(--shadow) * -0.33) 0 #fff,
        0 0 var(--glow) rgba(255, 255, 255, 0.6);
      animation: wobble 2.5s ease-in-out infinite;
    }

    .title span.letter.gap {
      width: 0.55em;
    }

    @keyframes wobble {
      0%   { transform: translate(0, 0) rotate(0deg) scale(1); }
      20%  { transform: translate(8px, -12px) rotate(12deg) scale(1.15); }
      40%  { transform: translate(-10px, 6px) rotate(-8deg) scale(0.9); }
      60%  { transform: translate(6px, 10px) rotate(6deg) scale(1.1); }
      80%  { transform: translate(-8px, -8px) rotate(-14deg) scale(1.05); }
      100% { transform: translate(4px, 4px) rotate(10deg) scale(1); }
    }

    @keyframes drift {
      0%   { transform: translate(-30px, -20px) rotate(-5deg); }
      25%  { transform: translate(40px, 15px) rotate(8deg); }
      50%  { transform: translate(-15px, 35px) rotate(-12deg); }
      75%  { transform: translate(25px, -30px) rotate(6deg); }
      100% { transform: translate(-20px, 10px) rotate(-3deg); }
    }

    .floater {
      position: fixed;
      font-size: clamp(1.5rem, 6vw, 4rem);
      pointer-events: none;
      animation: float-around 6s ease-in-out infinite;
      filter: drop-shadow(2px 2px 0 #000);
    }

    .floater:nth-child(1) { top: 8%;  left: 4%;  animation-delay: 0s;   animation-duration: 5s; }
    .floater:nth-child(2) { top: 72%; left: 78%; animation-delay: 1s;   animation-duration: 7s; }
    .floater:nth-child(3) { top: 18%; left: 72%; animation-delay: 2s;   animation-duration: 4.5s; }
    .floater:nth-child(4) { top: 82%; left: 8%;  animation-delay: 0.5s; animation-duration: 6.5s; }

    @keyframes float-around {
      0%   { transform: translate(0, 0) rotate(0deg); }
      25%  { transform: translate(60px, -40px) rotate(45deg); }
      50%  { transform: translate(-30px, 50px) rotate(-30deg); }
      75%  { transform: translate(40px, 30px) rotate(20deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    @media (max-width: 640px) and (orientation: portrait) {
      :root {
        --tile-size: clamp(100px, 32vw, 180px);
        --title-size: clamp(1.75rem, 8.2vw, 3.2rem);
      }
    }

    @media (max-width: 640px) and (orientation: landscape) {
      :root {
        --tile-size: clamp(100px, 32vw, 180px);
        --title-size: clamp(1.1rem, 5.2vw, 2.4rem);
      }
    }

    @media (max-width: 640px) {

      .line {
        white-space: normal;
        word-break: break-word;
      }

      @keyframes wobble {
        20%  { transform: translate(4px, -6px) rotate(10deg) scale(1.08); }
        40%  { transform: translate(-5px, 4px) rotate(-6deg) scale(0.95); }
        60%  { transform: translate(3px, 5px) rotate(5deg) scale(1.05); }
        80%  { transform: translate(-4px, -4px) rotate(-10deg) scale(1.02); }
        100% { transform: translate(2px, 2px) rotate(8deg) scale(1); }
      }

      @keyframes drift {
        0%   { transform: translate(-10px, -8px) rotate(-4deg); }
        25%  { transform: translate(14px, 8px) rotate(5deg); }
        50%  { transform: translate(-8px, 12px) rotate(-8deg); }
        75%  { transform: translate(10px, -10px) rotate(4deg); }
        100% { transform: translate(-8px, 5px) rotate(-2deg); }
      }

      @keyframes float-around {
        25%  { transform: translate(24px, -18px) rotate(30deg); }
        50%  { transform: translate(-14px, 22px) rotate(-20deg); }
        75%  { transform: translate(18px, 14px) rotate(15deg); }
      }
    }

    @media (max-width: 380px) and (orientation: portrait) {
      :root {
        --title-size: clamp(1.55rem, 7.5vw, 2.6rem);
        --tile-size: clamp(80px, 36vw, 140px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .title,
      .title span.letter,
      .floater {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="floater" aria-hidden="true">🍗</div>
  <div class="floater" aria-hidden="true">🐔</div>
  <div class="floater" aria-hidden="true">🔥</div>
  <div class="floater" aria-hidden="true">🍗</div>

  <div class="stage">
    <h1 class="title" id="title"></h1>
  </div>

  <script>
    const lines = ["HRMRMMRMMMMM", "POULER ROTI"];
    const colors = [
      "#ff006e", "#fb5607", "#ffbe0b", "#8338ec", "#3a86ff", "#06d6a0",
      "#ef476f", "#118ab2", "#ffd166", "#9b5de5", "#f15bb5", "#00bbf9",
      "#fee440", "#ff5400", "#ffbd00"
    ];

    const title = document.getElementById("title");
    let colorIndex = 0;

    for (const line of lines) {
      const lineEl = document.createElement("span");
      lineEl.className = "line";

      for (const char of line) {
        const span = document.createElement("span");
        span.className = char === " " ? "letter gap" : "letter";
        span.textContent = char;
        span.style.color = colors[colorIndex % colors.length];
        span.style.animationDelay = `${(colorIndex % 10) * 0.1}s`;
        span.style.animationDuration = `${1.5 + (colorIndex % 5) * 0.2}s`;
        colorIndex++;
        lineEl.appendChild(span);
      }

      title.appendChild(lineEl);
    }
  </script>
</body>
</html>
